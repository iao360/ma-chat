<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Групповые чаты</title>
    <style>
        * { box-sizing: border-box; }
        
        body.light {
            --bg: #f5f5f5;
            --card-bg: white;
            --text: #333;
            --border: #e0e0e0;
            --header-bg: white;
            --msg-bg: white;
            --input-bg: white;
            --online: #00cc44;
            --offline: #ccc;
            --group-bg: #f9f9f9;
        }
        
        body.dark {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #eee;
            --border: #2c3e50;
            --header-bg: #0f3460;
            --msg-bg: #1a1a2e;
            --input-bg: #0f3460;
            --online: #00ff88;
            --offline: #555;
            --group-bg: #1a1a2e;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            transition: background 0.3s, color 0.3s;
        }
        
        .site-header {
            background: var(--header-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .site-header button { width: auto; padding: 8px 16px; margin: 0; }
        
        .main-content {
            display: flex;
            flex-direction: row;
            padding: 12px;
            gap: 20px;
            height: calc(100vh - 70px);
        }
        
        .groups-panel {
            width: 300px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border);
            overflow-y: auto;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .create-group-card {
            background: var(--group-bg);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--border);
        }
        
        .create-group-card input, .create-group-card select {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            color: var(--text);
        }
        
        .create-group-card button {
            width: 100%;
            margin-top: 8px;
            background: #28a745;
        }
        
        .groups-list {
            flex: 1;
            overflow-y: auto;
        }
        
        .groups-list h4 {
            margin: 0 0 10px 0;
            font-size: 14px;
        }
        
        .group-item {
            padding: 12px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 12px;
            background: var(--group-bg);
            border: 1px solid var(--border);
            transition: all 0.2s;
            position: relative;
        }
        
        .group-item:hover { background: var(--border); }
        .group-item.active { background: #0066cc; color: white; }
        
        .group-name {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
        }
        
        .group-creator {
            font-size: 11px;
            opacity: 0.7;
        }
        
        .unread-badge-group {
            position: absolute;
            top: -5px;
            right: -5px;
            background: red;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .chat-container {
            flex: 1;
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        
        .chat-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            background: var(--card-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .group-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .group-color {
            width: 24px;
            height: 24px;
            border-radius: 12px;
        }
        
        .group-actions {
            display: flex;
            gap: 8px;
        }
        
        .group-actions button {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .members-panel {
            width: 250px;
            background: var(--card-bg);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid var(--border);
            overflow-y: auto;
            flex-shrink: 0;
        }
        
        .members-panel h4 { margin: 0 0 10px 0; font-size: 14px; }
        .members-panel ul { margin: 0; padding: 0; list-style: none; }
        .members-panel li {
            padding: 8px;
            margin: 3px 0;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        
        .online-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 8px;
            margin-right: 6px;
        }
        .online-indicator.online { background: var(--online); }
        .online-indicator.offline { background: var(--offline); }
        
        .remove-member-btn {
            background: #dc3545;
            padding: 2px 6px;
            font-size: 10px;
            width: auto;
        }
        
        .add-member-area {
            margin-top: 10px;
            display: flex;
            gap: 5px;
        }
        .add-member-area input { flex: 1; padding: 6px; font-size: 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--input-bg); color: var(--text); }
        .add-member-area button { width: auto; padding: 6px 10px; font-size: 12px; background: #28a745; }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            background: var(--bg);
            min-height: 0;
        }
        
        .chat-message {
            margin: 8px 0;
            padding: 10px 12px;
            background: var(--msg-bg);
            border-radius: 16px;
            word-wrap: break-word;
            border: 1px solid var(--border);
        }
        
        .chat-message.sending { opacity: 0.7; }
        .chat-message .time { font-size: 10px; color: #999; margin-left: 8px; }
        .chat-message img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 12px;
            margin-top: 8px;
            cursor: pointer;
        }
        
        .emoji-picker { display: inline-flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
        .emoji-btn {
            width: 36px;
            height: 36px;
            padding: 0;
            font-size: 20px;
            background: var(--bg);
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid var(--border);
        }
        
        .chat-input-area {
            display: flex;
            padding: 12px;
            gap: 8px;
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            flex-wrap: wrap;
        }
        .chat-input-area input { flex: 1; margin: 0; font-size: 16px; min-width: 150px; background: var(--input-bg); color: var(--text); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }
        .chat-input-area button { width: auto; margin: 0; padding: 12px 20px; }
        .image-upload-btn { background: #28a745; }
        
        .back-btn, .theme-toggle { background: #ff9800; }
        .back-btn { background: #0066cc; }
        
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 18px;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            max-width: 400px;
            width: 90%;
        }
        .modal-content button {
            margin: 10px 5px 0 0;
            width: auto;
            padding: 8px 16px;
        }
        
        @media (max-width: 900px) {
            .main-content { flex-direction: column; height: auto; }
            .groups-panel { width: 100%; max-height: 300px; }
            .members-panel { width: 100%; max-height: 200px; }
            .chat-messages { height: 400px; }
        }
    </style>
</head>
<body class="light">
    <div class="loading" id="loading">Загрузка...</div>
    
    <div id="mainApp" style="display: none;">
        <div class="site-header">
            <span>👥 Групповые чаты</span>
            <div style="display: flex; gap: 10px;">
                <button class="back-btn" onclick="goBack()">🏠 Общий чат</button>
                <button class="theme-toggle" onclick="toggleTheme()">🌓 Тема</button>
                <button onclick="logout()">Выйти</button>
            </div>
        </div>
        
        <div class="main-content">
            <div class="groups-panel">
                <div class="create-group-card">
                    <h4>➕ Создать группу</h4>
                    <input type="text" id="newGroupName" placeholder="Название группы">
                    <select id="newGroupColor">
                        <option value="#ff0000">🔴 Красный</option>
                        <option value="#ff7f00">🟠 Оранжевый</option>
                        <option value="#ffff00">🟡 Жёлтый</option>
                        <option value="#00ff00">🟢 Зелёный</option>
                        <option value="#0000ff">🔵 Синий</option>
                        <option value="#4b0082">🟣 Фиолетовый</option>
                        <option value="#9400d3">🟣 Пурпурный</option>
                        <option value="#ff69b4">🩷 Розовый</option>
                    </select>
                    <button onclick="createGroup()">Создать</button>
                </div>
                <div class="groups-list">
                    <h4>📁 Мои группы</h4>
                    <div id="groupsList"></div>
                </div>
            </div>
            
            <div class="chat-container" id="chatContainer" style="display: none;">
                <div class="chat-header">
                    <div class="group-info">
                        <div class="group-color" id="groupColor"></div>
                        <span id="selectedGroupName" style="font-weight: bold;"></span>
                        <span id="selectedGroupCreator" style="font-size: 11px; opacity: 0.7;"></span>
                    </div>
                    <div class="group-actions" id="groupActions"></div>
                </div>
                <div class="chat-messages" id="groupMessages">Выберите группу</div>
                <div class="chat-input-area">
                    <div class="emoji-picker">
                        <button class="emoji-btn" onclick="addEmoji('😀')">😀</button>
                        <button class="emoji-btn" onclick="addEmoji('😂')">😂</button>
                        <button class="emoji-btn" onclick="addEmoji('❤️')">❤️</button>
                        <button class="emoji-btn" onclick="addEmoji('🔥')">🔥</button>
                        <button class="emoji-btn" onclick="addEmoji('👍')">👍</button>
                        <button class="emoji-btn" onclick="addEmoji('🎉')">🎉</button>
                    </div>
                    <div style="display: flex; gap: 8px; width: 100%; flex-wrap: wrap;">
                        <input type="text" id="groupInput" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendGroupMessage()">
                        <input type="file" id="groupImageUpload" accept="image/*" style="display:none;" onchange="handleGroupImageUpload(this)">
                        <button class="image-upload-btn" onclick="document.getElementById('groupImageUpload').click()">📷</button>
                        <button onclick="sendGroupMessage()">Отправить</button>
                    </div>
                </div>
            </div>
            
            <div class="members-panel" id="membersPanel" style="display: none;">
                <h4>👥 Участники (<span id="membersCount">0</span>/40)</h4>
                <div id="membersList"></div>
                <div id="addMemberArea" style="display: none;">
                    <div class="add-member-area">
                        <input type="text" id="newMemberName" placeholder="Имя пользователя">
                        <button onclick="addMember()">➕</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modalTitle">Подтверждение</h3>
            <p id="modalMessage"></p>
            <button id="modalConfirmBtn" style="background: #dc3545;">Да</button>
            <button id="modalCancelBtn">Отмена</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let currentUserColor = '#0066cc';
        let currentTheme = 'light';
        let selectedGroup = null;
        let updateInterval = null;
        let activeUpdateInterval = null;
        let isUserScrolling = false;
        let scrollTimeout = null;
        let lastGroupMessageId = {};
        let unreadGroupCounts = {};
        
        function goBack() { window.location.href = '/'; }
        
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.body.className = currentTheme;
            localStorage.setItem('chat_theme', currentTheme);
            if (currentUser) {
                fetch('/api/update_theme', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentUser, theme: currentTheme }) });
            }
        }
        
        function compressImage(file, maxSizeKB = 500) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        let width = img.width, height = img.height, quality = 0.9;
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxWidth = 1200, maxHeight = 1200;
                        if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                        if (height > maxHeight) { width = (width * maxHeight) / height; height = maxHeight; }
                        canvas.width = width; canvas.height = height;
                        ctx.drawImage(img, 0, 0, width, height);
                        let compressed = canvas.toDataURL('image/jpeg', quality);
                        while (compressed.length > maxSizeKB * 1024 && quality > 0.3) {
                            quality -= 0.1;
                            compressed = canvas.toDataURL('image/jpeg', quality);
                        }
                        resolve(compressed);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }
        
        async function handleGroupImageUpload(fileInput) {
            let file = fileInput.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) { alert('Выберите изображение'); return; }
            try {
                let compressed = await compressImage(file, 500);
                document.getElementById('groupInput').value = compressed;
            } catch(e) { alert('Ошибка'); }
            fileInput.value = '';
        }
        
        function savePhoto(src) { const a = document.createElement('a'); a.href = src; a.download = `photo_${Date.now()}.jpg`; a.click(); }
        
        async function apiCall(url, method = 'GET', body = null) {
            let options = { method, headers: { 'Content-Type': 'application/json' } };
            if (body) options.body = JSON.stringify(body);
            let response = await fetch(url, options);
            return await response.json();
        }
        
        function addEmoji(emoji) {
            let input = document.getElementById('groupInput');
            if (input) input.value += emoji;
            input?.focus();
        }
        
        async function updateActiveStatus() {
            if (currentUser) await fetch('/api/active', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username: currentUser }) });
        }
        
        function formatMessage(text) {
            if (text && text.startsWith('data:image')) return `<img src="${text}" style="max-width:100%; max-height:300px; border-radius:12px; cursor:pointer;" onclick="savePhoto('${text}')">`;
            let formatted = escapeHtml(text);
            let imgRegex = /(https?:\/\/[^\s]+\.(jpg|jpeg|png|gif|webp))/gi;
            formatted = formatted.replace(imgRegex, match => `<img src="${match}" style="max-width:100%; max-height:300px; border-radius:12px; cursor:pointer;" onclick="savePhoto('${match}')">`);
            let urlRegex = /(https?:\/\/[^\s]+)/gi;
            formatted = formatted.replace(urlRegex, match => match.match(/\.(jpg|jpeg|png|gif|webp)$/i) ? match : `<a href="${match}" target="_blank">${match}</a>`);
            return formatted;
        }
        
        function escapeHtml(text) { let div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        function isAtBottom() {
            const container = document.getElementById('groupMessages');
            if (!container) return true;
            return container.scrollHeight - container.scrollTop - container.clientHeight < 50;
        }
        
        function scrollToBottomIfNeeded() {
            if (!isUserScrolling && isAtBottom()) {
                const container = document.getElementById('groupMessages');
                if (container) container.scrollTop = container.scrollHeight;
            }
        }
        
        function forceScrollToBottom() {
            const container = document.getElementById('groupMessages');
            if (container) container.scrollTop = container.scrollHeight;
        }
        
        async function loadGroups() {
            try {
                let groups = await apiCall('/api/groups?username=' + encodeURIComponent(currentUser));
                let container = document.getElementById('groupsList');
                container.innerHTML = '';
                if (!groups.length) {
                    container.innerHTML = '<div style="text-align:center; padding:20px;">У вас нет групп.<br>Создайте первую!</div>';
                    return;
                }
                for (let g of groups) {
                    let div = document.createElement('div');
                    div.className = 'group-item';
                    if (selectedGroup === g.id) div.classList.add('active');
                    let unread = unreadGroupCounts[g.id] || 0;
                    div.innerHTML = `<div class="group-name" style="color: ${g.color};">${escapeHtml(g.name)}</div>
                                    <div class="group-creator">создатель: ${escapeHtml(g.creator)}</div>
                                    ${unread > 0 ? `<span class="unread-badge-group">${unread > 99 ? '99+' : unread}</span>` : ''}`;
                    div.onclick = () => selectGroup(g.id);
                    container.appendChild(div);
                }
            } catch(e) { console.error('Ошибка загрузки групп:', e); }
        }
        
        async function selectGroup(groupId) {
            selectedGroup = groupId;
            await loadGroups();
            await loadGroupInfo();
            await loadMembers();
            await loadGroupMessages();
            await markGroupRead();
            await loadUnreadCounts();
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('membersPanel').style.display = 'block';
        }
        
        async function loadGroupInfo() {
            let groups = await apiCall('/api/groups?username=' + encodeURIComponent(currentUser));
            let group = groups.find(g => g.id === selectedGroup);
            if (group) {
                document.getElementById('selectedGroupName').innerHTML = `<span style="color:${group.color}">${escapeHtml(group.name)}</span>`;
                document.getElementById('groupColor').style.backgroundColor = group.color;
                document.getElementById('selectedGroupCreator').innerHTML = `создатель: ${escapeHtml(group.creator)}`;
                let actions = document.getElementById('groupActions');
                actions.innerHTML = '';
                if (group.creator === currentUser) {
                    let clearBtn = document.createElement('button');
                    clearBtn.textContent = '🗑️ Очистить чат';
                    clearBtn.style.background = '#dc3545';
                    clearBtn.onclick = () => confirmAction('Очистить весь чат?', () => clearGroupChat());
                    actions.appendChild(clearBtn);
                    let deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '❌ Удалить группу';
                    deleteBtn.style.background = '#dc3545';
                    deleteBtn.onclick = () => confirmAction('Удалить группу навсегда?', () => deleteGroup());
                    actions.appendChild(deleteBtn);
                }
                let leaveBtn = document.createElement('button');
                leaveBtn.textContent = '🚪 Выйти из группы';
                leaveBtn.style.background = '#ff9800';
                leaveBtn.onclick = () => confirmAction('Выйти из группы?', () => leaveGroup());
                actions.appendChild(leaveBtn);
            }
        }
        
        async function loadMembers() {
            let members = await apiCall('/api/group_members', 'POST', { group_id: selectedGroup });
            let container = document.getElementById('membersList');
            let membersCount = members.length;
            document.getElementById('membersCount').innerText = membersCount;
            container.innerHTML = '';
            for (let m of members) {
                let li = document.createElement('li');
                li.innerHTML = `<span><span class="online-indicator ${m.online ? 'online' : 'offline'}"></span><span style="color:${m.color}">${escapeHtml(m.username)}</span></span>`;
                if (selectedGroup) {
                    let creator = await getGroupCreator();
                    if (currentUser === creator && m.username !== currentUser) {
                        let removeBtn = document.createElement('button');
                        removeBtn.textContent = '❌';
                        removeBtn.className = 'remove-member-btn';
                        removeBtn.onclick = () => confirmAction(`Удалить ${m.username} из группы?`, () => removeMember(m.username));
                        li.appendChild(removeBtn);
                    }
                }
                container.appendChild(li);
            }
            let addArea = document.getElementById('addMemberArea');
            let creator = await getGroupCreator();
            if (currentUser === creator && membersCount < 40) {
                addArea.style.display = 'block';
            } else {
                addArea.style.display = 'none';
            }
        }
        
        async function getGroupCreator() {
            let groups = await apiCall('/api/groups?username=' + encodeURIComponent(currentUser));
            let group = groups.find(g => g.id === selectedGroup);
            return group ? group.creator : null;
        }
        
        async function addMember() {
            let username = document.getElementById('newMemberName').value.trim();
            if (!username) { alert('Введите имя пользователя'); return; }
            let res = await apiCall('/api/add_member', 'POST', { group_id: selectedGroup, username: username, creator: currentUser });
            if (res.success) {
                document.getElementById('newMemberName').value = '';
                await loadMembers();
                alert('Пользователь добавлен');
            } else {
                alert(res.error || 'Ошибка');
            }
        }
        
        async function removeMember(username) {
            await apiCall('/api/remove_member', 'POST', { group_id: selectedGroup, username: username, creator: currentUser });
            await loadMembers();
            await loadGroups();
        }
        
        async function leaveGroup() {
            await apiCall('/api/leave_group', 'POST', { group_id: selectedGroup, username: currentUser });
            selectedGroup = null;
            document.getElementById('chatContainer').style.display = 'none';
            document.getElementById('membersPanel').style.display = 'none';
            await loadGroups();
        }
        
        async function deleteGroup() {
            await apiCall('/api/delete_group', 'POST', { group_id: selectedGroup, creator: currentUser });
            selectedGroup = null;
            document.getElementById('chatContainer').style.display = 'none';
            document.getElementById('membersPanel').style.display = 'none';
            await loadGroups();
        }
        
        async function clearGroupChat() {
            await apiCall('/api/clear_group_chat', 'POST', { group_id: selectedGroup, creator: currentUser });
            await loadGroupMessages();
            alert('Чат очищен');
        }
        
        async function loadGroupMessages() {
            if (!selectedGroup) return;
            let messages = await apiCall('/api/group_messages', 'POST', { group_id: selectedGroup });
            let container = document.getElementById('groupMessages');
            if (!messages.length) { 
                container.innerHTML = '<div class="chat-message">Нет сообщений</div>';
                lastGroupMessageId[selectedGroup] = 0;
                return; 
            }
            let currentMaxId = messages[messages.length - 1].id;
            let lastId = lastGroupMessageId[selectedGroup] || 0;
            let needScroll = !isUserScrolling && isAtBottom();
            if (currentMaxId > lastId) {
                if (lastId === 0) {
                    container.innerHTML = '';
                    for (let msg of messages) {
                        let div = document.createElement('div');
                        div.className = 'chat-message';
                        div.innerHTML = `<strong style="color:${msg.author_color || '#0066cc'}">${escapeHtml(msg.author)}</strong><span class="time">${msg.time}</span><br>${formatMessage(msg.text)}`;
                        container.appendChild(div);
                    }
                } else {
                    let newMessages = messages.filter(msg => msg.id > lastId);
                    for (let msg of newMessages) {
                        let div = document.createElement('div');
                        div.className = 'chat-message';
                        div.innerHTML = `<strong style="color:${msg.author_color || '#0066cc'}">${escapeHtml(msg.author)}</strong><span class="time">${msg.time}</span><br>${formatMessage(msg.text)}`;
                        container.appendChild(div);
                    }
                }
                lastGroupMessageId[selectedGroup] = currentMaxId;
                if (needScroll) container.scrollTop = container.scrollHeight;
            }
        }
        
        async function sendGroupMessage() {
            if (!selectedGroup) { alert('Выберите группу'); return; }
            let input = document.getElementById('groupInput');
            let text = input.value.trim();
            if (!text) return;
            let now = new Date();
            let timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}:${now.getSeconds().toString().padStart(2,'0')}`;
            let tempId = 'temp_group_' + Date.now();
            let container = document.getElementById('groupMessages');
            let tempDiv = document.createElement('div');
            tempDiv.className = 'chat-message sending';
            tempDiv.id = tempId;
            tempDiv.innerHTML = `<strong style="color:${currentUserColor}">${escapeHtml(currentUser)}</strong><span class="time">${timeStr}</span><br>${formatMessage(text)}<div class="message-actions"><small>⏳ отправляется...</small></div>`;
            container.appendChild(tempDiv);
            forceScrollToBottom();
            input.value = '';
            try {
                await apiCall('/api/send_group_message', 'POST', { group_id: selectedGroup, author: currentUser, text: text, time: timeStr, timestamp: Date.now() });
                document.getElementById(tempId)?.remove();
                await loadGroupMessages();
                forceScrollToBottom();
                await loadUnreadCounts();
            } catch(e) { document.getElementById(tempId)?.remove(); alert('Ошибка'); }
        }
        
        async function loadUnreadCounts() {
            try {
                let res = await apiCall('/api/group_unread_count', 'POST', { username: currentUser });
                unreadGroupCounts = res.groups || {};
                await loadGroups();
            } catch(e) { console.error(e); }
        }
        
        async function markGroupRead() {
            if (selectedGroup) {
                await apiCall('/api/mark_group_read', 'POST', { group_id: selectedGroup, username: currentUser });
                await loadUnreadCounts();
            }
        }
        
        async function createGroup() {
            let name = document.getElementById('newGroupName').value.trim();
            let color = document.getElementById('newGroupColor').value;
            if (!name) { alert('Введите название группы'); return; }
            if (!currentUser) { alert('Вы не авторизованы'); return; }
            
            console.log('Создаём группу:', name, color, currentUser);
            
            try {
                let res = await fetch('/api/create_group', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, color: color, creator: currentUser })
                });
                let data = await res.json();
                console.log('Ответ сервера:', data);
                
                if (data.success) {
                    document.getElementById('newGroupName').value = '';
                    await loadGroups();
                    await loadUnreadCounts();
                    if (data.group_id) selectGroup(data.group_id);
                    alert('Группа создана!');
                } else {
                    alert(data.error || 'Ошибка создания группы');
                }
            } catch(e) {
                console.error('Ошибка:', e);
                alert('Ошибка соединения с сервером');
            }
        }
        
        function confirmAction(message, callback) {
            document.getElementById('modalMessage').innerText = message;
            document.getElementById('modal').style.display = 'flex';
            let confirmBtn = document.getElementById('modalConfirmBtn');
            let cancelBtn = document.getElementById('modalCancelBtn');
            let newConfirm = confirmBtn.cloneNode(true);
            let newCancel = cancelBtn.cloneNode(true);
            confirmBtn.parentNode.replaceChild(newConfirm, confirmBtn);
            cancelBtn.parentNode.replaceChild(newCancel, cancelBtn);
            newConfirm.onclick = () => { document.getElementById('modal').style.display = 'none'; callback(); };
            newCancel.onclick = () => { document.getElementById('modal').style.display = 'none'; };
        }
        
        async function checkAuth() {
            let savedUser = localStorage.getItem('chat_current_user');
            if (!savedUser) { window.location.href = '/'; return false; }
            let users = await apiCall('/api/users');
            let userExists = users.some(u => u.username === savedUser);
            if (!userExists && savedUser !== 'admin') {
                localStorage.removeItem('chat_current_user');
                window.location.href = '/';
                return false;
            }
            return savedUser;
        }
        
        async function init() {
            let user = await checkAuth();
            if (!user) return;
            currentUser = user;
            
            let loginRes = await apiCall('/api/login', 'POST', { username: currentUser, password: '' });
            if (loginRes.success) {
                currentUserColor = loginRes.color || '#0066cc';
                currentTheme = loginRes.theme || 'light';
                document.body.className = currentTheme;
                localStorage.setItem('chat_theme', currentTheme);
            } else {
                let users = await apiCall('/api/users');
                let userData = users.find(u => u.username === currentUser);
                if (userData) currentUserColor = userData.color || '#0066cc';
            }
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            await loadGroups();
            await loadUnreadCounts();
            updateActiveStatus();
            
            if (activeUpdateInterval) clearInterval(activeUpdateInterval);
            activeUpdateInterval = setInterval(() => updateActiveStatus(), 15000);
            
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(async () => {
                if (selectedGroup) {
                    await loadGroupMessages();
                    await loadMembers();
                }
                await loadUnreadCounts();
            }, 4000);
            
            const chatContainer = document.getElementById('groupMessages');
            if (chatContainer) {
                chatContainer.addEventListener('scroll', () => {
                    isUserScrolling = true;
                    if (scrollTimeout) clearTimeout(scrollTimeout);
                    scrollTimeout = setTimeout(() => {
                        isUserScrolling = false;
                        scrollToBottomIfNeeded();
                    }, 300);
                });
            }
        }
        
        function logout() {
            localStorage.removeItem('chat_current_user');
            window.location.href = '/';
        }
        
        init();
    </script>
</body>
</html>
